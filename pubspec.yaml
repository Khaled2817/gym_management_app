name: gym_management_app
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.9.2

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # state management
  flutter_bloc: ^9.1.1

  # code generator (mainly used for cubit & retrofit)
  freezed: ^3.2.5
  freezed_annotation: ^3.1.0

  # Automatic JSON Generate code and deserialization to and from json
  json_serializable: ^6.12.0
  json_annotation: ^4.10.0

  # network
  dio: ^5.9.1
  retrofit: ^4.9.2
  retrofit_generator: ^10.2.1
  pretty_dio_logger: ^1.3.1

  # Localization
  intl: ^0.20.2
  easy_localization: ^3.0.8

  # Native Splash
  flutter_native_splash: ^2.4.7

  # Dependency Injection
  get_it: ^9.2.0

  # UI Components for svg rendering images
  flutter_svg: ^2.2.3

  # UI Components for responsive design
  flutter_screenutil: ^5.9.3

  # A Flutter plugin for securely storing sensitive data using encrypted storage
  flutter_secure_storage: ^10.0.0

  # A Flutter plugin for offline data
  flutter_offline: ^6.0.0
  # Code Generator
  build_runner: ^2.11.1
  # form validate 
  # flutter_form_builder:
  reactive_forms:
  # image picker for select one image
  image_picker: ^1.1.2
  # select country and phone
  intl_phone_field: ^3.2.0
  # select item
  dropdown_button2:
  # map
  google_maps_flutter: 
  geocoding:
  geolocator:
  location:
  # icons
  font_awesome_flutter:
  # video 
  video_player:
  # show massage 
  fluttertoast:
  # phone
  phone_numbers_parser:
  # sms auto
  sms_autofill:
  # border -----
  dotted_border:
  # file 
  file_picker:
  # notfication manager
  flutter_local_notifications: ^20.1.0 
  firebase_messaging: ^16.1.1
  firebase_core: 
  timezone: ^0.10.1
  # path provider
  path:
  injectable:
  uuid:
  equatable:
  # dartz
  dartz: ^0.10.1
  # mobile information
  device_info_plus:
  # Qr code
  pretty_qr_code: ^3.6.0
  # Lottie animations
  lottie: ^3.2.0
  # Shimmer loading
  shimmer: ^3.0.0
  # Cached Network Image
  cached_network_image: ^3.4.0
  # Charts
  fl_chart: ^0.69.0
#   # zego_zim: ^2.27.0
# zego_uikit_prebuilt_call: ^3.19.0
# vibration: ^3.1.8
 # nfc
  # nfc_manager: ^4.2.0
 # qr_code_scanner: ^0.7.0
  qr_code_scanner_plus: ^2.0.13
  

























dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/translations/
    - assets/images/
    - assets/svg/
    - assets/fonts/
    - assets/animations/
  
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter_18pt-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter_18pt-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter_18pt-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter_18pt-Bold.ttf
          weight: 700

    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
        - asset: assets/fonts/Tajawal-Medium.ttf
        - asset: assets/fonts/Tajawal-Bold.ttf
          



